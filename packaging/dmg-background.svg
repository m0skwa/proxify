<svg xmlns="http://www.w3.org/2000/svg" width="660" height="400" viewBox="0 0 660 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b1f23"/>
      <stop offset="1" stop-color="#121417"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e57000" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#ff8a1f"/>
    </linearGradient>
  </defs>

  <rect width="660" height="400" fill="url(#bg)"/>
  <rect x="0" y="0" width="660" height="400" fill="none" stroke="#2e3338" stroke-width="1"/>

  <!-- wordmark -->
  <text x="330" y="70" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif"
        font-size="34" font-weight="700" fill="#e8eaed">Pro<tspan fill="#e57000">x</tspan>ify</text>
  <text x="330" y="102" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif"
        font-size="14" fill="#9aa0a6">Drag the app onto the Applications folder to install</text>

  <!-- arrow from app -> Applications (icons sit at y ~205) -->
  <g transform="translate(0,205)">
    <line x1="258" y1="0" x2="398" y2="0" stroke="url(#arrow)" stroke-width="6" stroke-linecap="round"/>
    <path d="M 398 0 L 380 -11 L 380 11 Z" fill="#ff8a1f"/>
  </g>

  <text x="330" y="330" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif"
        font-size="11" fill="#6b7177">Proxmox VE desktop client</text>
</svg>
